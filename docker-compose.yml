services:
  postgres:
    image: postgres:16-alpine
    container_name: journal-blog-postgres
    environment:
      POSTGRES_DB: journal_blog
      POSTGRES_USER: journal_blog
      POSTGRES_PASSWORD: journal_blog_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  blog:
    build: .
    container_name: journal-blog
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://journal_blog:journal_blog_password@postgres:5432/journal_blog}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    container_name: journal-blog-caddy
    depends_on:
      - blog
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
