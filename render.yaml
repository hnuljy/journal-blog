databases:
  - name: journal-blog-db
    databaseName: journal_blog
    user: journal_blog

services:
  - type: web
    name: journal-blog
    env: node
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: journal-blog-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: change-me-now
      - key: BASE_URL
        value: https://journal-blog.onrender.com
